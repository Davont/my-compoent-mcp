        body {
            margin: 0;
            padding: 16px;
        }

        .layout-root {
            position: relative;
        }

        .layout-node {
            box-sizing: border-box;
            flex-shrink: 0;
        }

        /* 组合类：flex方向 + 交叉轴对齐 */
        .flex-row-start {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
        }

        .flex-row-center {
            display: flex;
            flex-direction: row;
            align-items: center;
        }

        .flex-row-end {
            display: flex;
            flex-direction: row;
            align-items: flex-end;
        }

        .flex-col-start {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
        }

        .flex-col-center {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .flex-col-end {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        /* 主轴对齐（较少使用，保留单独类） */
        .justify-center {
            justify-content: center;
        }

        .justify-end {
            justify-content: flex-end;
        }

        .justify-between {
            justify-content: space-between;
        }

        /* 按钮重置并默认居中 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            border: none;
            padding: 0;
            background: none;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        /* 图片/图标占位背景 - 纯灰色，与背景渐变区分 */
        .type-image,
        .type-icon,
        .type-vector {
            background: #d1d5db !important;
            border-radius: 4px;
        }

    <script>
        (function () {
            var designWidth = 360;
            var container = document.getElementById('layout-container');
            function updateScale() {
                var deviceWidth = window.innerWidth - 32; // 减去 body padding
                var scale = Math.min(deviceWidth / designWidth, 1);
                container.style.transform = 'scale(' + scale + ')';
                container.style.transformOrigin = 'top left';
            }
            updateScale();
            window.addEventListener('resize', updateScale);
        })();
    </script>
